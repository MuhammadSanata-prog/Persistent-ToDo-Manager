<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="container bg-primary rounded text-white p-3">
        <div class="row align-items-center justify-content-between">
            <div class="col-12 col-md-auto">
                <span>DashBoard</span>
            </div>
            <div class="col-12 col-md-auto">
                <a href="index.html">
                    <button type="button" class="btn btn-success">
                        Home
                    </button>
                </a>

            </div>
        </div>
    </nav>



    <!-- main section -->
    <main>

        <div class="container mt-5">
            <div class="row justify-content-center align-items-center g-4">


                <div class="col-12 col-md-4 ">
                    <h1 class="text-primary">Stay Organized Get Things Done</h1>


                    <p class="text-success">Add your tasks , Manage them Efficiently and Achieve your Goals</p>



                </div>



                <div class="col-12 col-md-6 text-white  rounded">


                    <div class="table-responsive">

                        <table class="table table-striped table-hover table-primary ">
                            <thead>
                                <tr>
                                    <th scope="col">#-ID</th>
                                    <th scope="col">Title</th>
                                    <th scope="col">Description</th>
                                    <th scope="col">Location</th>
                                </tr>
                            </thead>
                            <tbody id="table">
                                <!-- <tr>
                                    <th scope="row">1</th>
                                    <td>Otto</td>
                                    <td>DSA</td>
                                    <td>Kashmir</td>
                                </tr>
                                <tr>
                                    <th scope="row">2</th>
                                    <td>Thornton</td>
                                    <td>DEVELOPMENT</td>
                                    <td>Islamabad</td>
                                </tr>
                                <tr>
                                    <th scope="row">3</th>
                                    <td>Doe</td>
                                    <td>ANALYTICS</td>
                                    <td>Lahore</td>
                                </tr> -->

                            </tbody>
                        </table>
                    </div>
                    <td>

                        <button class="btn btn-sm btn-warning " data-bs-toggle="modal" data-bs-target="#updateModal"
                            onclick="update()">
                            Update
                        </button>
                        <button class="btn btn-sm btn-success" onclick="dell()">Delete</button>


                        <button type="button" class="btn btn-sm btn-warning   " onclick="read()">
                            Read Task
                        </button>

                    </td>
                </div>
            </div>
        </div>

    </main>

    <!-- footer  -->
    <div class="container mt-3 bg-primary rounded p-4">
        <div class="row align-items-center justify-content-center text-white  ">
            <div class="col-12 col-md-6">
                <p>All Rights are Reserved @copyright. Mr.Husnain</p>
            </div>
        </div>
    </div>



    <div class="modal fade" id="updateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Modal title</h3>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h3>Title</h3>
                    <input type="text" id="updateTitle"  placeholder="Title">
                </div>
                <div class="modal-body">
                    <h3>Description</h3>
                    <input type="text" id="updateDesc"  placeholder="Description">
                </div>
                <div class="modal-body">
                    <h3>Location</h3>
                    <input type="text" id="updateLoc"  placeholder="Location">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveChanges()">Save changes</button>
                </div>
            </div>
        </div>
    </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
