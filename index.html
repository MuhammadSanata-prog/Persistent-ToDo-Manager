<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persistent Multi-Page ToDo Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- <nav class="container-fluid  bg-primary "> -->
  <nav class="container bg-primary rounded text-white p-3">
    <div class="row align-items-center justify-content-between">
      <div class="col-12 col-md-auto">
        <span>Persistent Multi-Page ToDo Manager</span>
      </div>
      <div class="col-12 col-md-auto">
        <a href="Dashboard.html">
          <button type="button" class="btn btn-success">
            DashBoard
          </button>
        </a>

      </div>
    </div>
  </nav>
  <!-- main section -->
  <div class="container mt-4 ">
    <div class="row g-4 justify-content-center align-items-center">

      <div class="col-12  col-md-4 ">
        <h1 class="text-primary">Stay Organized Get Things Done</h1>
        <p class="text-success">Add your tasks , Manage them Efficiently and Achieve your Goals</p>
        <img src="images/todoside.png" class="img-fluid" alt="">
      </div>

      <div class="col-12 col-md-6  bg-primary text-white p-4 rounded">

        <form action="">
          <div class="mb-3">
            <label for="inputTitle" class="form-label">Title</label>
            <input type="text" class="form-control" id="inputTitle" name="title">
          </div>

          <div class="mb-3">
            <label for="inputDescription" class="form-label">Description</label>
            <input type="text" class="form-control" id="inputDescription" name="description">
          </div>

          <div class="mb-3">
            <label for="inputLocation" class="form-label">Location</label>
            <input type="text" class="form-control" id="inputLocation" name="location">
          </div>

          <div class="row g-2">

            <div class="col-12 col-md-6">
              
              <button type="submit" class="btn btn-success w-100" onclick="Add()">
                Add Task
              </button>
            </div>
            <!-- <div class="col-12 col-md-6">
              
              <button type="button" class="btn btn-warning w-100  " onclick="read()">
                Read Task
              </button>
            </div> -->
          </div>
        </form>

      </div>
    </div>
  </div>



  <!-- footer -->

  <div class="container mt-3 bg-primary rounded p-4">
    <div class="row align-items-center justify-content-center text-white  ">
      <div class="col-12 col-md-6">
        <p>All Rights are Reserved @copyright. Mr.Husnain</p>
      </div>
    </div>
  </div>
  <script src="script.js">

  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
  </script>
</body>

</html>
